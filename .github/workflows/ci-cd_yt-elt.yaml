name: CI-CD Pipeline

on:
  push:
    branches:
      - main
      - 'feature/*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get changed files
        id: changed-files-build
        uses: tj-actions/changed-files@v45
        with:
          files: |
            Dockerfile
            **/requirements.txt

      - name: Set up Docker Buildx
        if: steps.changed-files-build.outputs.any_changed == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        if: steps.changed-files-build.outputs.any_changed == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push Docker image
        if: steps.changed-files-build.outputs.any_changed == 'true'
        run: |
          docker buildx build --push \
            --tag ${{ vars.DOCKERHUB_NAMESPACE }}/${{ vars.DOCKERHUB_REPOSITORY }}:latest \
            --tag ${{ vars.DOCKERHUB_NAMESPACE }}/${{ vars.DOCKERHUB_REPOSITORY }}:${{ github.sha }} .

  unit-and-integration-and-e2e-tests:
    runs-on: ubuntu-latest
    needs: build-and-push-image

    env:
      AIRFLOW_WWW_USER_PASSWORD: ${{ secrets.AIRFLOW_WWW_USER_PASSWORD }}
      AIRFLOW_WWW_USER_USERNAME: ${{ secrets.AIRFLOW_WWW_USER_USERNAME }}
      API_KEY: ${{ secrets.API_KEY }}
      CELERY_BACKEND_NAME: ${{ secrets.CELERY_BACKEND_NAME }}
      CELERY_BACKEND_PASSWORD: ${{ secrets.CELERY_BACKEND_PASSWORD }}
      CELERY_BACKEND_USERNAME: ${{ secrets.CELERY_BACKEND_USERNAME }}
      ELT_DATABASE_NAME: ${{ secrets.ELT_DATABASE_NAME }}
      ELT_DATABASE_PASSWORD: ${{ secrets.ELT_DATABASE_PASSWORD }}
      ELT_DATABASE_USERNAME: ${{ secrets.ELT_DATABASE_USERNAME }}
      ELT_DATABASE_HOST: ${{ secrets.POSTGRES_CONN_HOST }}
      ELT_DATABASE_PORT: ${{ secrets.POSTGRES_CONN_PORT }}
      FERNET_KEY: ${{ secrets.FERNET_KEY }}
      METADATA_DATABASE_NAME: ${{ secrets.METADATA_DATABASE_NAME }}
      METADATA_DATABASE_PASSWORD: ${{ secrets.METADATA_DATABASE_PASSWORD }}
      METADATA_DATABASE_USERNAME: ${{ secrets.METADATA_DATABASE_USERNAME }}
      POSTGRES_USER: ${{ secrets.POSTGRES_CONN_USERNAME }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_CONN_PASSWORD }}
      POSTGRES_CONN_HOST: ${{ secrets.POSTGRES_CONN_HOST }}
      POSTGRES_CONN_PORT: ${{ secrets.POSTGRES_CONN_PORT }}
      POSTGRES_CONN_USERNAME: ${{ secrets.POSTGRES_CONN_USERNAME }}
      AIRFLOW_UID: ${{ vars.AIRFLOW_UID }}
      CHANNEL_HANDLE: ${{ vars.CHANNEL_HANDLE }}
      DOCKERHUB_NAMESPACE: ${{ vars.DOCKERHUB_NAMESPACE }}
      DOCKERHUB_REPOSITORY: ${{ vars.DOCKERHUB_REPOSITORY }}
      DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get changed files
        id: changed-files-tests
        uses: tj-actions/changed-files@v45
        with:
          files: |
            dags/**
            include/**
            docker-compose.yaml
            **/requirements.txt

      - name: Debug changed files
        run: |
          echo "ANY CHANGED: ${{ steps.changed-files-tests.outputs.any_changed }}"
          echo "FILES:"
          echo "${{ steps.changed-files-tests.outputs.all_changed_files }}"

      - name: Determine affected DAGs
        id: affected-dags
        run: |
          CHANGED_FILES="${{ steps.changed-files-tests.outputs.all_changed_files }}"
          echo "Changed files:"
          echo "$CHANGED_FILES"

          AFFECTED_DAGS=()

          # If core infra changes → run ALL DAGs
          if echo "$CHANGED_FILES" | grep -E "docker-compose.yaml|requirements.txt"; then
            AFFECTED_DAGS=("produce_json" "Updating_Database" "Data_Quality")
          else
            if echo "$CHANGED_FILES" | grep -E "dags/produce_json"; then
              AFFECTED_DAGS+=("produce_json")
            fi

            if echo "$CHANGED_FILES" | grep -E "dags/Updating_Database|datawarehouse"; then
              AFFECTED_DAGS+=("Updating_Database")
            fi

            if echo "$CHANGED_FILES" | grep -E "Data_Quality|soda"; then
              AFFECTED_DAGS+=("Data_Quality")
            fi
          fi

          UNIQUE_DAGS=$(printf "%s\n" "${AFFECTED_DAGS[@]}" | sort -u)

          echo "Affected DAGs:"
          echo "$UNIQUE_DAGS"

          echo "dags<<EOF" >> $GITHUB_OUTPUT
          echo "$UNIQUE_DAGS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Set up Docker compose
        if: steps.changed-files-tests.outputs.any_changed == 'true'
        run: docker compose up -d

      - name: Wait for services
        if: steps.changed-files-tests.outputs.any_changed == 'true'
        run: sleep 15

      - name: Run unit and integration tests
        if: steps.changed-files-tests.outputs.any_changed == 'true'
        run: docker exec -t airflow-worker sh -c "pytest tests/ -v"

      - name: Run end-to-end DAG tests
        if: steps.changed-files-tests.outputs.any_changed == 'true'
        run: |
          if [ -z "${{ steps.affected-dags.outputs.dags }}" ]; then
            echo "No DAGs affected. Skipping."
            exit 0
          fi

          echo "Running DAGs:"
          echo "${{ steps.affected-dags.outputs.dags }}"

          while IFS= read -r DAG; do
            docker exec -t airflow-worker sh -c "airflow dags test $DAG"
          done <<< "${{ steps.affected-dags.outputs.dags }}"

      - name: Tear down docker compose
        if: steps.changed-files-tests.outputs.any_changed == 'true'
        run: docker compose down